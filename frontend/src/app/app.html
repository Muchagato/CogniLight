<nav class="top-nav">
  <span class="brand">CogniLight</span>
  <div class="nav-spacer"></div>
  @if (!layout.isMobile()) {
    <button class="chat-toggle" [class.active]="layout.chatOpen()" (click)="layout.toggleChat()" title="AI Assistant">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
    </button>
  }
</nav>
<main>
  <router-outlet />
</main>
@if (layout.isMobile()) {
  <nav class="bottom-nav">
    <button class="bottom-nav-tab" [class.active]="layout.mobileView() === 'map'" (click)="layout.setMobileView('map')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
      <span>Map</span>
    </button>
    <button class="bottom-nav-tab" [class.active]="layout.mobileView() === 'dashboard'" (click)="layout.setMobileView('dashboard')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>Dashboard</span>
    </button>
    <button class="bottom-nav-tab" [class.active]="layout.mobileView() === 'chat'" (click)="layout.setMobileView('chat')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span>Chat</span>
    </button>
  </nav>
}
