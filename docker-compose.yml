services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend
      - ai-service
    # In Docker, frontend nginx proxies /api/* and /hubs/* to backend and ai-service.
    # For local dev without Docker, use `ng serve` with proxy.conf.json instead.

  backend:
    build: ./backend/CogniLight.Api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Data Source=/data/cognilight.db
    volumes:
      - db-data:/data

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    depends_on:
      - backend
    environment:
      - DATABASE_PATH=/data/cognilight.db
    volumes:
      - db-data:/data

volumes:
  db-data:
