<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#181c24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow behind bulb -->
  <circle cx="600" cy="240" r="160" fill="url(#glow)"/>

  <!-- Light bulb icon -->
  <g transform="translate(600, 240)" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bulb body -->
    <path d="M0-60a45 45 0 0 0-26 81.5V32h52V21.5A45 45 0 0 0 0-60z" stroke-width="3"/>
    <!-- Base lines -->
    <line x1="-18" y1="32" x2="18" y2="32"/>
    <line x1="-14" y1="44" x2="14" y2="44"/>
    <line x1="-8" y1="56" x2="8" y2="56"/>
    <!-- Rays -->
    <line x1="0" y1="-80" x2="0" y2="-95" stroke-opacity="0.5"/>
    <line x1="55" y1="-55" x2="66" y2="-66" stroke-opacity="0.5"/>
    <line x1="-55" y1="-55" x2="-66" y2="-66" stroke-opacity="0.5"/>
    <line x1="75" y1="0" x2="90" y2="0" stroke-opacity="0.5"/>
    <line x1="-75" y1="0" x2="-90" y2="0" stroke-opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#f59e0b" letter-spacing="4">CogniLight</text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Smart City Lighting Dashboard</text>

  <!-- Tech tags -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#64748b">
    <text x="410" y="490" text-anchor="middle">Real-time Telemetry</text>
    <text x="600" y="490" text-anchor="middle" fill="#22d3ee">AI-Powered Analysis</text>
    <text x="790" y="490" text-anchor="middle">Anomaly Detection</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="200" y="540" width="800" height="2" rx="1" fill="#f59e0b" opacity="0.3"/>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#252a36" stroke-width="2"/>
</svg>
