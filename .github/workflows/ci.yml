name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image base
        run: echo "IMAGE_BASE=${IMAGE_BASE,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/CogniLight.Api
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}

      - name: Build and push ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/ai-service:latest
            ${{ env.IMAGE_BASE }}/ai-service:${{ github.sha }}

      # Set all packages to private (requires gh CLI with packages scope)
      - name: Set package visibility to private
        run: |
          for pkg in frontend backend ai-service; do
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              /user/packages/container/$(echo ${{ github.repository }} | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')%2F${pkg}/visibility \
              -f visibility=private 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
